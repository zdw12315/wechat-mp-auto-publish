name: WeChat MP Auto Publish

on:
  schedule:
    # 每天早上 7:00 和晚上 19:00 运行 (UTC时间)
    # UTC 23:00 = 北京时间 7:00
    # UTC 11:00 = 北京时间 19:00
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Run publisher
      env:
        WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
      run: |
        python publisher.py
